name: Fly Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-group

    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fly.io Secrets
        run: |
          cd ${{ secrets.FOLDER__API }}
          flyctl secrets set \
            JWTKEY="${{ secrets.JWTKEY }}" \
            CONNECTIONSTRING__PRODUCTION__SERVER="${{ secrets.CONNECTIONSTRING__PRODUCTION__SERVER }}" \
            CONNECTIONSTRING__PRODUCTION__PORT="${{ secrets.CONNECTIONSTRING__PRODUCTION__PORT }}" \
            CONNECTIONSTRING__PRODUCTION__DATABASE="${{ secrets.CONNECTIONSTRING__PRODUCTION__DATABASE }}" \
            CONNECTIONSTRING__PRODUCTION__USERID="${{ secrets.CONNECTIONSTRING__PRODUCTION__USERID }}" \
            CONNECTIONSTRING__PRODUCTION__PASSWORD="${{ secrets.CONNECTIONSTRING__PRODUCTION__PASSWORD }}" \
            EMAILSETTINGS__SMTPSERVER="${{ secrets.EMAILSETTINGS__SMTPSERVER }}" \
            EMAILSETTINGS__SMTPPORT="${{ secrets.EMAILSETTINGS__SMTPPORT }}" \
            EMAILSETTINGS__IMAPSERVER="${{ secrets.EMAILSETTINGS__IMAPSERVER }}" \
            EMAILSETTINGS__IMAPPORT="${{ secrets.EMAILSETTINGS__IMAPPORT }}" \
            EMAILSETTINGS__FROM="${{ secrets.EMAILSETTINGS__FROM }}" \
            EMAILSETTINGS__PASSWORD="${{ secrets.EMAILSETTINGS__PASSWORD }}" \
            BLOBSETTINGS__TOKEN="${{ secrets.BLOBSETTINGS__TOKEN }}" \
            BLOBSETTINGS__STOREID="${{ secrets.BLOBSETTINGS__STOREID }}" \
            BLOBSETTINGS__BLOBNAME="${{ secrets.BLOBSETTINGS__BLOBNAME }}" \
            KESTREL__CERTIFICATES__DEVELOPMENT__PASSWORD="${{ secrets.KESTREL__CERTIFICATES__DEVELOPMENT__PASSWORD }}" \
            INTEGRATIONSETTINGS__WHATSAPP__TOKEN="${{ secrets.INTEGRATIONSETTINGS__WHATSAPP__TOKEN }}" \
            INTEGRATIONSETTINGS__WHATSAPP__PHONEID="${{ secrets.INTEGRATIONSETTINGS__WHATSAPP__PHONEID }}" \
            INTEGRATIONSETTINGS__WHATSAPP__BUSSINESSID="${{ secrets.INTEGRATIONSETTINGS__WHATSAPP__BUSSINESSID }}" \
            INTEGRATIONSETTINGS__WHATSAPP__VERIFYTOKEN="${{ secrets.INTEGRATIONSETTINGS__WHATSAPP__VERIFYTOKEN }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: |
          cd ${{ secrets.FOLDER__API }}
          flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
